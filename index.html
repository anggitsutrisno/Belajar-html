<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <!-- judul dari web yang dibuat ada dibrowser -->
  <title>Belajar HTML</title>

  <!-- meta viewport ada meta yang membuat tampilan dimobile rapi -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--meta decription adalah meta unutuk menjelas isi web yang dibuat akan  muncul digogle  -->
  <meta name="description" content="belajar html">

  <!-- meta refersh adalah meta yang digunkan agar suatu halaman merefesh selama waktu yang ditentukan -->
  <meta http-equiv="refresh" content="5">

  <!-- meta yang menentukan tipe dokumen -->
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">

  <!-- meta author adalah meta yang memeberikan infromasi siapa pembuat web ini -->
  <meta name="author" content="anggit sutrisno">

  <!-- meta og title  berfungsi unutuk memberikan judul utma saat link dibagikan -->
  <meta property="og:title" content="Portfolio Anggit">

  <!-- meta og decription  berfungsi unutuk memberikan deskripsi tentang web yang dibagikan -->
  <meta property="og:description" content="Website portfolio IT">

  <!-- meta og type menentukan jenis konten -->
  <meta property="og:type" content="website">

  <!-- meta og url adalah URL lengkap dari halaman web -->
  <meta property="og:url" content="https://anggitsutrisno.github.io/Belajar-html/belajar.html">

  <!-- meta og image  adalah memberikan gambaran pada saat wb dibagikan  tanpa ada  penulisan link webnya saat dibagikan(HARUS URL LENGKAP) -->
  <meta property="og:image" content="https://anggitsutrisno.github.io/Belajar-html/assets/profile.jpg">
  <!-- meta og image width dan height untuk optimasi -->
  <meta property="og:image:width" content="100">
  <meta property="og:image:height" content="630">
  <!-- meta og image alt untuk deskripsi gambar -->
  <meta property="og:image:alt" content="profile anggit sutrisno">
</head>

<body>
  <h1>belajar html</h1>
  <p>hari ini kita belajar html </p>

  <div>
    <h1>mari belajar html</h1>
    <p>pemakaain div </p>
  </div>
  <hr>
  <p>ini adalah penggunaa tag A untuk tautan <a href="https://www.google.com/?zx=1777359187959">link</a></p>
  <hr>


</body>

</html>
